name: meta_sdk
description: A flutter plugin to get facebook deep links and log app events using the latest Facebook SDK to include support for iOS 14. Modernized for Meta SDK.
version: 1.2.0
homepage: https://github.com/amajust/meta_sdk

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        pluginClass: MetaSdkPlugin
        package: saad.farhan.meta_sdk
      ios:
        pluginClass: SwiftMetaSdkPlugin
